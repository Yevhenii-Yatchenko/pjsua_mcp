# Phone profile for load_phone_profile.
#
# Save this file on the host at ./config/phones.yaml (the docker-compose
# bind mounts ./config to /config inside the container), fill in the
# credentials for your SIP stand, then invoke the MCP tool:
#
#   mcp__pjsua__load_phone_profile()                               # /config/phones.yaml
#   mcp__pjsua__load_phone_profile(path="/config/other.yaml")      # another profile
#
# This file is the canonical template; get_phone_profile_example() returns
# the same content over MCP for callers who don't have filesystem access.
#
# Recording is always on. Every call lands in /recordings/<phone_id>/
# as call_<call_id>_<ts>.wav along with a .meta.json sidecar containing
# codec, duration, remote URI, direction, and (if a capture is running)
# the paired pcap path. To "disable" recording, just skip the
# ./recordings bind-mount on docker run and files go to ephemeral
# container FS.
#
# Auto-capture (tcpdump per call) is OFF by default. Opt in per phone
# with `capture_enabled: true` — pcaps land in /captures/<phone_id>/
# with the same basename as the recording.

# Keys under `defaults` are merged into every phone entry.
# Phone-level keys win over defaults.
defaults:
  domain: sip.example.com
  password: change_me
  codecs: [PCMA]
  transport: udp
  auto_answer: false
  register: true
  srtp: false
  # recording_enabled: true    # default — flip to false to suppress
                               # recording for every phone by default
  # capture_enabled: false     # default — flip to true to auto-run
                               # tcpdump on every call

phones:
  - phone_id: a
    username: "1001"
    capture_enabled: true      # auto-capture only phone a

  - phone_id: b
    username: "1002"
    auto_answer: true

  - phone_id: c
    username: "1003"
    auto_answer: true
    # recording_enabled: false  # per-phone override wins over defaults
    # Per-phone override:
    # password: "c_specific_pw"
    # realm: "example.realm"
