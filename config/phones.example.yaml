# Phone profile for load_phones.
#
# Save this file on the host at ./config/phones.yaml (the docker-compose
# bind mounts ./config to /config inside the container), fill in the
# credentials for your SIP stand, then invoke the MCP tool:
#
#   mcp__pjsua__load_phones()                               # /config/phones.yaml
#   mcp__pjsua__load_phones(path="/config/other.yaml")      # another profile
#
# This file is the canonical template — copy it to ./config/phones.yaml
# and edit the credentials.
#
# Recording AND auto-capture both default to OFF. Opt in per phone:
#
#   recording_enabled: true   → /recordings/<phone_id>/call_<id>_<ts>.wav
#                               plus a .meta.json sidecar (codec, duration,
#                               remote URI, direction, paired pcap path).
#   capture_enabled: true     → /captures/<phone_id>/call_<id>_<ts>.pcap
#                               (tcpdump per call; broad udp BPF filter).
#
# When both are on, the WAV and pcap share a basename so they pair up
# on disk without any timestamp matching.

# Keys under `defaults` are merged into every phone entry.
# Phone-level keys win over defaults.
defaults:
  domain: sip.example.com
  password: change_me
  codecs: [PCMA]
  transport: udp
  auto_answer: false
  register: true
  srtp: false
  # recording_enabled: false   # default — flip to true to record every
                               # call on every phone by default
  # capture_enabled: false     # default — flip to true to auto-run
                               # tcpdump on every call

phones:
  - phone_id: a
    username: "1001"
    recording_enabled: true    # per-phone override — only 'a' records
    capture_enabled: true      # per-phone override — only 'a' captures

  - phone_id: b
    username: "1002"
    auto_answer: true

  - phone_id: c
    username: "1003"
    auto_answer: true
    # recording_enabled: true   # per-phone override wins over defaults
    # Per-phone override:
    # password: "c_specific_pw"
    # realm: "example.realm"
