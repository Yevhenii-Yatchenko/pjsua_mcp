name: wait-until-demo
description: >
  Demonstrates the `wait_until` flow-control action by gating outbound DTMF on a
  user-emitted checkpoint instead of hooking on `call.state.confirmed` directly.
  A places a call to B, B auto-answers; once the call is confirmed and a 300 ms
  media-warm-up delay has passed, the confirmed-hook emits `user.media_warm`. A
  separate inline hook armed at scenario start blocks on `wait_until: user.media_warm`
  before sending DTMF — this is the only example in the catalogue that exercises
  the wait_until action, closing a coverage gap reported in the 2026-04-25 run.
phones: [a, b]

patterns:
  - {use: auto-answer, phone_id: b, delay_ms: 100}

initial_actions:
  - {action: make_call, phone_id: a, dest_uri: "sip:6002@asterisk"}

hooks:
  # Once the call confirms, give the media bridge ~300 ms to settle, then
  # emit a custom signal. Other hooks block on this signal via wait_until.
  - when: call.state.confirmed
    on_phone: a
    once: true
    then:
      - wait: 300ms
      - emit: {name: media_warm}

  # Armed at scenario.started: blocks on the user-emitted checkpoint, then
  # drives DTMF + teardown. Demonstrates wait_until as an alternative to
  # nested call.state.confirmed hooks for ordering across phases.
  - when: scenario.started
    once: true
    then:
      - wait_until: {event: user.media_warm, timeout_ms: 8000}
      - send_dtmf: {phone_id: a, digits: "5"}
      - wait: 500ms
      - hangup: {phone_id: a}

stop_on:
  - {phone_id: a, event: call.state.disconnected}

timeout_ms: 15000
