name: ivr-navigation-example
description: >
  Auto-attendant / IVR navigation: dial a test extension, wait for prompt,
  press '1', wait for sub-prompt, press '2', wait, press '*' to exit. Uses
  scenario-level hooks to express the step sequence explicitly.

phones: [a]

patterns:
  - {use: wait-for-registration, phone_id: a}
  - {use: make-call-and-wait-confirmed, phone_id: a, dest_uri: "sip:6999@asterisk"}

hooks:
  - when: call.state.confirmed
    on_phone: a
    once: true
    then:
      - wait: 2000ms        # wait for greeting
      - send_dtmf: "1"
      - wait: 3000ms        # wait for sub-menu prompt
      - send_dtmf: "2"
      - wait: 1500ms
      - send_dtmf: "*"
      - wait: 1000ms
      - hangup

stop_on:
  - {phone_id: a, event: call.state.disconnected}

timeout_ms: 25000
