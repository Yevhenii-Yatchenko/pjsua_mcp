name: blind-transfer
description: >
  A calls B. B picks up, waits 2s, then blind-transfers A to C (REFER, no
  consultation). C picks up, A talks with C for 3s, then A hangs up.
  Exercises the REFER / xfer pjsua path end-to-end.

phones: [a, b, c]

patterns:
  - {use: wait-for-registration, phone_id: a, timeout_ms: 5000}
  - {use: wait-for-registration, phone_id: b, timeout_ms: 5000}
  - {use: wait-for-registration, phone_id: c, timeout_ms: 5000}
  - {use: auto-answer, phone_id: b, delay_ms: 200}
  - {use: auto-answer, phone_id: c, delay_ms: 200}
  - {use: blind-transfer, phone_id: b, transfer_to: "sip:1003@asterisk", after_ms: 2000}
  - {use: hangup-after-duration, phone_id: a, duration_ms: 5000}
  - {use: make-call-and-wait-confirmed, phone_id: a, dest_uri: "sip:1002@asterisk", timeout_ms: 10000}

stop_on:
  - {phone_id: a, event: call.state.disconnected}

timeout_ms: 30000
