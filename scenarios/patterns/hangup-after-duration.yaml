name: hangup-after-duration
version: 1.0.0
description: Hang up phone_id's call duration_ms after it reaches CONFIRMED.
tags: [outgoing, basic, single-phone, timer]
rationale: >
  Most reproducible call-completion scenarios need a deterministic call
  duration (for RTP-stats averaging, recording size, codec switches timing).
  This fires from the CONFIRMED transition so the clock starts at the same
  point regardless of ring time.
params:
  phone_id:
    type: string
    required: true
    pattern: "^[a-z0-9_]{1,32}$"
  duration_ms:
    type: integer
    required: true
    minimum: 100
    maximum: 300000
examples:
  - use: hangup-after-duration
    phone_id: a
    duration_ms: 5000
failure_modes:
  - call.state.confirmed never fires — hangup never scheduled
  - peer hangs up first — hangup on a disconnected call is no-op
---
hooks:
  - when: call.state.confirmed
    on_phone: "{{ phone_id }}"
    once: true
    then:
      - wait: "{{ duration_ms }}ms"
      - hangup
expected_timeline:
  - event: call.state.confirmed
    phone_id: "{{ phone_id }}"
  - action: hangup
    phone_id: "{{ phone_id }}"
    after_ms: "{{ duration_ms }}"
  - event: call.state.disconnected
    phone_id: "{{ phone_id }}"
    within_ms: 2000
