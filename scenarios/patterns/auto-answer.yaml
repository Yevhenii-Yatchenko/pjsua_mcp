name: auto-answer
version: 1.0.0
description: Answer every incoming call on the target phone after an optional delay.
tags: [incoming, basic, single-phone]
rationale: >
  Most test scenarios require the callee to pick up automatically; a small
  delay is useful to model real human answer-time or to probe "early media
  before answer" behaviour.
params:
  phone_id:
    type: string
    required: true
    pattern: "^[a-z0-9_]{1,32}$"
  delay_ms:
    type: integer
    default: 0
    minimum: 0
    maximum: 30000
  status_code:
    type: integer
    default: 200
    enum: [200, 202]
examples:
  - use: auto-answer
    phone_id: b
  - use: auto-answer
    phone_id: b
    delay_ms: 500
failure_modes:
  - call.state.incoming never fires (caller never calls us)
---
hooks:
  - when: call.state.incoming
    on_phone: "{{ phone_id }}"
    once: false
    then:
      {% if delay_ms > 0 %}
      - wait: "{{ delay_ms }}ms"
      {% endif %}
      - answer: {code: {{ status_code }}}
expected_timeline:
  - event: call.state.incoming
    phone_id: "{{ phone_id }}"
  - action: answer
    after_ms: "{{ delay_ms }}"
  - event: call.state.confirmed
    phone_id: "{{ phone_id }}"
    within_ms: 3000
