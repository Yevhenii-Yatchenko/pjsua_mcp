name: fail-fast-on-error
version: 1.0.0
description: Abort the scenario if any of given phones disconnects with a blacklisted status code.
tags: [teardown, coordinator, multi-phone]
rationale: >
  Prevents silent failures: if a call goes straight to 486 / 503 / 603, the
  scenario should stop immediately rather than spend its timeout waiting.
  Emits `user.scenario_failed` which can be used in stop_on.
params:
  phone_ids:
    type: array
    required: true
    items: {type: string, pattern: "^[a-z0-9_]{1,32}$"}
    minItems: 1
  fail_codes:
    type: array
    default: [486, 480, 503, 603, 487, 408]
    items: {type: integer, minimum: 400, maximum: 699}
examples:
  - use: fail-fast-on-error
    phone_ids: [a, b]
    fail_codes: [486, 503]
---
hooks:
  {% for pid in phone_ids %}
  - when: call.state.disconnected
    on_phone: "{{ pid }}"
    match: {last_status: {{ fail_codes }} }
    once: false
    then:
      - log: "fail-fast triggered on {{ pid }} with bad status"
      - emit: {name: scenario_failed, data: {phone_id: "{{ pid }}"}}
  {% endfor %}
expected_timeline: []
