name: play-audio-on-confirmed
version: 1.0.0
description: Play a WAV file on phone_id's call once CONFIRMED; hangup when playback ends.
tags: [outgoing, media, single-phone]
rationale: >
  Useful for tests that need deterministic audio (tone sweeps, silence,
  known phonemes) flowing into the RTP stream — both for recording-quality
  validation and for AA/IVR input that reacts to audio energy.
params:
  phone_id: {type: string, required: true, pattern: "^[a-z0-9_]{1,32}$"}
  audio_path: {type: string, required: true}
  loop: {type: boolean, default: false}
examples:
  - use: play-audio-on-confirmed
    phone_id: a
    audio_path: "/app/audio/test-tone.wav"
---
hooks:
  - when: call.state.confirmed
    on_phone: "{{ phone_id }}"
    once: true
    then:
      - action: play_audio
        file: "{{ audio_path }}"
        loop: {{ loop | lower }}
expected_timeline:
  - event: call.state.confirmed
    phone_id: "{{ phone_id }}"
  - action: play_audio
    file: "{{ audio_path }}"
