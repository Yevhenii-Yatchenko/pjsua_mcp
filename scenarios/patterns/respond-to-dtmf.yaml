name: respond-to-dtmf
version: 1.0.0
description: When a specific DTMF digit arrives on phone_id, execute an action.
tags: [dtmf, incoming, single-phone]
rationale: >
  Auto-attendant / IVR testing: simulate a user pressing a digit and react
  accordingly (answer, hangup, transfer). Usable both on incoming-side (we
  are the IVR) and outgoing (we are the caller reacting to prompts).
params:
  phone_id: {type: string, required: true, pattern: "^[a-z0-9_]{1,32}$"}
  digit: {type: string, required: true, pattern: "^[0-9*#A-Da-d]$"}
  response_action: {type: string, default: "answer", enum: [answer, hangup, hold, unhold]}
examples:
  - use: respond-to-dtmf
    phone_id: b
    digit: "1"
    response_action: answer
---
hooks:
  - when: dtmf.in
    on_phone: "{{ phone_id }}"
    match: {digit: "{{ digit }}"}
    once: true
    then:
      - log: "got DTMF {{ digit }} on {{ phone_id }}"
      - "{{ response_action }}"
expected_timeline:
  - event: dtmf.in
    phone_id: "{{ phone_id }}"
    digit: "{{ digit }}"
  - action: "{{ response_action }}"
