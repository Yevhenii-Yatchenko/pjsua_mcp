name: reinvite-codec-change
version: 1.0.0
description: After call reaches CONFIRMED and a delay, swap to new_codec via re-INVITE.
tags: [media, codec, outgoing, single-phone, timer]
rationale: >
  Reproduces mid-call codec changes (PCMU → G.722, PCMA → opus, ...). Tests
  that RTP flow survives the re-INVITE and the new SDP is respected.
params:
  phone_id: {type: string, required: true, pattern: "^[a-z0-9_]{1,32}$"}
  new_codec: {type: string, required: true, enum: [PCMU, PCMA, G722, opus, G729, iLBC]}
  trigger_at_ms: {type: integer, default: 3000, minimum: 100, maximum: 60000}
examples:
  - use: reinvite-codec-change
    phone_id: a
    new_codec: G722
    trigger_at_ms: 3000
---
hooks:
  - when: call.state.confirmed
    on_phone: "{{ phone_id }}"
    once: true
    then:
      - wait: "{{ trigger_at_ms }}ms"
      - action: set_codecs
        codecs: ["{{ new_codec }}"]
        phone_id: "{{ phone_id }}"
expected_timeline:
  - event: call.state.confirmed
  - action: set_codecs
    after_ms: "{{ trigger_at_ms }}"
