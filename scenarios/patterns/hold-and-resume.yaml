name: hold-and-resume
version: 1.0.0
description: After CONFIRMED, hold the call for hold_duration_ms, then unhold.
tags: [hold, basic, single-phone, timer]
rationale: >
  Covers the re-INVITE with sendonly/sendrecv path; verifies media is paused
  during hold (no RTP) and resumes cleanly.
params:
  phone_id: {type: string, required: true, pattern: "^[a-z0-9_]{1,32}$"}
  hold_start_delay_ms: {type: integer, default: 1000, minimum: 0}
  hold_duration_ms: {type: integer, required: true, minimum: 100}
examples:
  - use: hold-and-resume
    phone_id: a
    hold_duration_ms: 3000
---
hooks:
  - when: call.state.confirmed
    on_phone: "{{ phone_id }}"
    once: true
    then:
      - wait: "{{ hold_start_delay_ms }}ms"
      - hold
      - wait: "{{ hold_duration_ms }}ms"
      - unhold
expected_timeline:
  - event: call.state.confirmed
  - action: hold
  - action: unhold
    after_ms: "{{ hold_duration_ms }}"
