name: send-dtmf-on-confirmed
version: 1.0.0
description: Send DTMF digits from phone_id once its call reaches CONFIRMED state.
tags: [dtmf, outgoing, single-phone]
rationale: >
  Navigating an IVR or auto-attendant menu needs DTMF sent on a live call
  leg. Firing on call.state.confirmed ensures media is established before we
  push digits into a dead RTP stream.
params:
  phone_id:
    type: string
    required: true
    pattern: "^[a-z0-9_]{1,32}$"
  digits:
    type: string
    required: true
    pattern: "^[0-9*#A-Da-d]+$"
  initial_delay_ms:
    type: integer
    default: 100
    minimum: 0
    maximum: 10000
examples:
  - use: send-dtmf-on-confirmed
    phone_id: a
    digits: "1"
  - use: send-dtmf-on-confirmed
    phone_id: a
    digits: "1234#"
    initial_delay_ms: 500
failure_modes:
  - call.state.confirmed never fires (call rejected / call-drop mid-setup)
  - DTMF send fails if call already disconnected (race)
---
hooks:
  - when: call.state.confirmed
    on_phone: "{{ phone_id }}"
    once: true
    then:
      {% if initial_delay_ms > 0 %}
      - wait: "{{ initial_delay_ms }}ms"
      {% endif %}
      - send_dtmf: "{{ digits }}"
expected_timeline:
  - event: call.state.confirmed
    phone_id: "{{ phone_id }}"
  - action: send_dtmf
    phone_id: "{{ phone_id }}"
    after_ms: "{{ initial_delay_ms }}"
    digits: "{{ digits }}"
