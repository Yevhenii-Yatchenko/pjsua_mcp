; Minimal Asterisk PJSIP config for integration testing.
; Two local extensions (6001, 6002) that can call each other.

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; --- Extension 6001 ---

[6001]
type=endpoint
context=testing
message_context=messages
disallow=all
allow=ulaw
allow=alaw
auth=6001
aors=6001
direct_media=no

[6001]
type=auth
auth_type=userpass
username=6001
password=test123

[6001]
type=aor
max_contacts=1
remove_existing=yes

; --- Extension 6002 ---

[6002]
type=endpoint
context=testing
message_context=messages
disallow=all
allow=ulaw
allow=alaw
auth=6002
aors=6002
direct_media=no

[6002]
type=auth
auth_type=userpass
username=6002
password=test123

[6002]
type=aor
max_contacts=1
remove_existing=yes
